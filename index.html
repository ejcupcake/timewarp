<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blue Line Time Warp</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100svh;
      background: radial-gradient(circle at top, #1a1d24 0%, #090a0f 42%, #050507 100%);
      color: #f5f7ff;
    }

    main {
      width: min(430px, 100vw);
      min-height: 100svh;
      margin: 0 auto;
      box-sizing: border-box;
      padding: 1.2rem 0.9rem 1.8rem;
      display: grid;
      gap: 0.8rem;
      background: #000;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
      margin-top: 0.4rem;
    }

    h1 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: 0.02em;
      font-weight: 700;
    }

    .status-pill {
      border: 1px solid #2f323a;
      border-radius: 999px;
      padding: 0.25rem 0.55rem;
      background: #101218;
      color: #d7dcef;
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .panel {
      display: flex;
      gap: 0.55rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: #1b1f2b;
      color: #fff;
      border: 1px solid #2f323a;
      border-radius: 999px;
      padding: 0.6rem 0.95rem;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
    }

    button.primary {
      background: #f5f7ff;
      color: #050507;
      border-color: #f5f7ff;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border-radius: 1rem;
      border: 1px solid #1f232d;
      background: #0a0b10;
    }

    canvas {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #090c17;
      image-rendering: optimizeQuality;
    }

    .canvas-wrap canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #scanline {
      background: transparent;
      pointer-events: none;
    }

    .settings {
      display: grid;
      gap: 0.35rem;
      margin-top: 0.2rem;
    }

    label {
      color: #c7ccdc;
      font-size: 0.86rem;
      padding-left: 0.1rem;
    }

    select {
      background: #101218;
      color: #f5f7ff;
      border: 1px solid #2f323a;
      border-radius: 0.65rem;
      padding: 0.55rem 0.7rem;
      font: inherit;
    }

    .hidden-video {
      position: fixed;
      width: 1px;
      height: 1px;
      top: -1000px;
      left: -1000px;
      opacity: 0;
      pointer-events: none;
    }

    p {
      margin: 0;
      color: #bcc3d6;
      font-size: 0.9rem;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <main>
    <div class="top-bar">
      <h1>Blue Line Time Warp</h1>
      <span id="status" class="status-pill">Idle</span>
    </div>
    <p>Click Start Camera to begin. The blue line scans once (horizontal or vertical) and captures a slice of time into the output.</p>
    <div class="canvas-wrap">
      <canvas id="output" width="640" height="480" aria-label="Time warp output"></canvas>
      <canvas id="scanline" width="640" height="480" aria-hidden="true"></canvas>
    </div>
    <div class="panel">
      <button id="start" class="primary">Start Camera</button>
      <button id="switch-camera">Switch Camera</button>
      <button id="reset" disabled>Reset Warp</button>
    </div>
    <div class="settings">
      <label for="direction">Direction</label>
      <select id="direction">
        <option value="horizontal" selected>Horizontal</option>
        <option value="vertical">Vertical</option>
      </select>
    </div>
  </main>

  <video id="video" class="hidden-video" playsinline autoplay muted></video>
  <canvas id="frame" width="640" height="480" hidden></canvas>
  <canvas id="warp" width="640" height="480" hidden></canvas>

  <script>
    const startBtn = document.getElementById('start');
    const switchCameraBtn = document.getElementById('switch-camera');
    const resetBtn = document.getElementById('reset');
    const directionSelect = document.getElementById('direction');
    const statusEl = document.getElementById('status');

    const video = document.getElementById('video');
    const outputCanvas = document.getElementById('output');
    const scanlineCanvas = document.getElementById('scanline');
    const frameCanvas = document.getElementById('frame');
    const warpCanvas = document.getElementById('warp');

    const outputCtx = outputCanvas.getContext('2d');
    const scanlineCtx = scanlineCanvas.getContext('2d');
    const frameCtx = frameCanvas.getContext('2d');
    const warpCtx = warpCanvas.getContext('2d');

    let stream;
    let facingMode = 'user';
    let scanPos = 0;
    let direction = directionSelect.value;
    let isScanning = false;
    let animationId;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function resetOutput() {
      stopLoop();
      scanPos = 0;
      isScanning = true;
      outputCtx.fillStyle = '#090c17';
      outputCtx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
      warpCtx.clearRect(0, 0, warpCanvas.width, warpCanvas.height);
      scanlineCtx.clearRect(0, 0, scanlineCanvas.width, scanlineCanvas.height);
      setStatus(stream ? 'Warp reset. Scanning once…' : 'Warp reset. Ready to scan.');
      if (stream) {
        draw();
      }
    }

    function stopLoop() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = undefined;
      }
    }

    function stopStream() {
      if (!stream) {
        return;
      }
      stream.getTracks().forEach((track) => track.stop());
      stream = undefined;
      resetBtn.disabled = true;
    }

    function draw() {
      if (!isScanning) {
        return;
      }

      if (video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) {
        animationId = requestAnimationFrame(draw);
        return;
      }

      frameCtx.drawImage(video, 0, 0, frameCanvas.width, frameCanvas.height);
      outputCtx.drawImage(frameCanvas, 0, 0, outputCanvas.width, outputCanvas.height);

      if (direction === 'horizontal') {
        warpCtx.drawImage(
          frameCanvas,
          scanPos,
          0,
          1,
          frameCanvas.height,
          scanPos,
          0,
          1,
          warpCanvas.height
        );

        outputCtx.drawImage(
          warpCanvas,
          0,
          0,
          scanPos + 1,
          warpCanvas.height,
          0,
          0,
          scanPos + 1,
          outputCanvas.height
        );
      } else {
        warpCtx.drawImage(
          frameCanvas,
          0,
          scanPos,
          frameCanvas.width,
          1,
          0,
          scanPos,
          warpCanvas.width,
          1
        );

        outputCtx.drawImage(
          warpCanvas,
          0,
          0,
          warpCanvas.width,
          scanPos + 1,
          0,
          0,
          outputCanvas.width,
          scanPos + 1
        );
      }

      scanlineCtx.clearRect(0, 0, scanlineCanvas.width, scanlineCanvas.height);
      scanlineCtx.save();
      scanlineCtx.strokeStyle = '#37b7ff';
      scanlineCtx.lineWidth = 2;
      scanlineCtx.beginPath();
      if (direction === 'horizontal') {
        scanlineCtx.moveTo(scanPos + 0.5, 0);
        scanlineCtx.lineTo(scanPos + 0.5, scanlineCanvas.height);
      } else {
        scanlineCtx.moveTo(0, scanPos + 0.5);
        scanlineCtx.lineTo(scanlineCanvas.width, scanPos + 0.5);
      }
      scanlineCtx.stroke();
      scanlineCtx.restore();

      scanPos += 1;
      const maxPos = direction === 'horizontal' ? outputCanvas.width : outputCanvas.height;
      if (scanPos >= maxPos) {
        isScanning = false;
        outputCtx.drawImage(warpCanvas, 0, 0, outputCanvas.width, outputCanvas.height);
        scanlineCtx.clearRect(0, 0, scanlineCanvas.width, scanlineCanvas.height);
        setStatus('Completed one full warp pass.');
        stopLoop();
        return;
      }

      animationId = requestAnimationFrame(draw);
    }

    async function startCamera(requestedFacingMode = facingMode) {
      if (stream) {
        return;
      }
      if (!navigator.mediaDevices?.getUserMedia) {
        setStatus('Camera API is unavailable in this browser.');
        return;
      }

      startBtn.disabled = true;
      switchCameraBtn.disabled = true;
      setStatus('Requesting camera permission…');

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: requestedFacingMode },
            width: { ideal: 640 },
            height: { ideal: 480 }
          },
          audio: false
        });

        video.srcObject = stream;

        await video.play();
        facingMode = requestedFacingMode;
        resetBtn.disabled = false;
        resetOutput();
        const cameraLabel = facingMode === 'environment' ? 'rear' : 'front';
        setStatus(`Camera active (${cameraLabel}). Scanning one full pass…`);
      } catch (error) {
        startBtn.disabled = false;
        switchCameraBtn.disabled = false;
        setStatus('Camera access failed. Please allow permissions and retry.');
        console.error(error);
        return;
      }

      switchCameraBtn.disabled = false;
    }

    async function switchCamera() {
      const nextFacingMode = facingMode === 'user' ? 'environment' : 'user';

      if (!stream) {
        facingMode = nextFacingMode;
        const cameraLabel = facingMode === 'environment' ? 'rear' : 'front';
        setStatus(`Camera set to ${cameraLabel}. Tap Start Camera.`);
        return;
      }

      stopLoop();
      stopStream();
      await startCamera(nextFacingMode);
    }

    startBtn.addEventListener('click', () => startCamera(facingMode));
    switchCameraBtn.addEventListener('click', switchCamera);
    resetBtn.addEventListener('click', resetOutput);
    directionSelect.addEventListener('change', () => {
      direction = directionSelect.value;
      if (stream) {
        resetOutput();
      }
    });

    window.addEventListener('beforeunload', () => {
      stopLoop();
      stopStream();
    });

    resetOutput();
  </script>
</body>
</html>
