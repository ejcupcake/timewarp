<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blue Line Time Warp</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e5ecff;
    }

    main {
      width: min(920px, 96vw);
      display: grid;
      gap: 0.75rem;
    }

    .panel {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      background: #2754ff;
      color: #fff;
      border: 0;
      border-radius: 0.4rem;
      padding: 0.55rem 0.8rem;
      cursor: pointer;
      font: inherit;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
    }

    canvas {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #090c17;
      border: 1px solid #1d284f;
      border-radius: 0.5rem;
      image-rendering: optimizeQuality;
    }

    .canvas-wrap canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #scanline {
      background: transparent;
      border: 0;
      pointer-events: none;
    }

    .hidden-video {
      position: fixed;
      width: 1px;
      height: 1px;
      top: -1000px;
      left: -1000px;
      opacity: 0;
      pointer-events: none;
    }

    p {
      margin: 0;
      color: #b3c5ff;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Blue Line Time Warp</h1>
    <p>Click Start Camera to begin. The blue line scans once (horizontal or vertical) and captures a slice of time into the output.</p>
    <div class="panel">
      <button id="start">Start Camera</button>
      <button id="reset" disabled>Reset Warp</button>
      <label for="direction">Direction</label>
      <select id="direction">
        <option value="horizontal" selected>Horizontal</option>
        <option value="vertical">Vertical</option>
      </select>
      <span id="status">Idle</span>
    </div>
    <div class="canvas-wrap">
      <canvas id="output" width="640" height="480" aria-label="Time warp output"></canvas>
      <canvas id="scanline" width="640" height="480" aria-hidden="true"></canvas>
    </div>
  </main>

  <video id="video" class="hidden-video" playsinline autoplay muted></video>
  <canvas id="frame" width="640" height="480" hidden></canvas>
  <canvas id="warp" width="640" height="480" hidden></canvas>

  <script>
    const startBtn = document.getElementById('start');
    const resetBtn = document.getElementById('reset');
    const directionSelect = document.getElementById('direction');
    const statusEl = document.getElementById('status');

    const video = document.getElementById('video');
    const outputCanvas = document.getElementById('output');
    const scanlineCanvas = document.getElementById('scanline');
    const frameCanvas = document.getElementById('frame');
    const warpCanvas = document.getElementById('warp');

    const outputCtx = outputCanvas.getContext('2d');
    const scanlineCtx = scanlineCanvas.getContext('2d');
    const frameCtx = frameCanvas.getContext('2d');
    const warpCtx = warpCanvas.getContext('2d');

    let stream;
    let scanPos = 0;
    let direction = directionSelect.value;
    let isScanning = false;
    let animationId;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function resetOutput() {
      stopLoop();
      scanPos = 0;
      isScanning = true;
      outputCtx.fillStyle = '#090c17';
      outputCtx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
      warpCtx.clearRect(0, 0, warpCanvas.width, warpCanvas.height);
      scanlineCtx.clearRect(0, 0, scanlineCanvas.width, scanlineCanvas.height);
      setStatus(stream ? 'Warp reset. Scanning once…' : 'Warp reset. Ready to scan.');
      if (stream) {
        draw();
      }
    }

    function stopLoop() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = undefined;
      }
    }

    function draw() {
      if (!isScanning) {
        return;
      }

      if (video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) {
        animationId = requestAnimationFrame(draw);
        return;
      }

      frameCtx.drawImage(video, 0, 0, frameCanvas.width, frameCanvas.height);
      outputCtx.drawImage(frameCanvas, 0, 0, outputCanvas.width, outputCanvas.height);

      if (direction === 'horizontal') {
        warpCtx.drawImage(
          frameCanvas,
          scanPos,
          0,
          1,
          frameCanvas.height,
          scanPos,
          0,
          1,
          warpCanvas.height
        );

        outputCtx.drawImage(
          warpCanvas,
          0,
          0,
          scanPos + 1,
          warpCanvas.height,
          0,
          0,
          scanPos + 1,
          outputCanvas.height
        );
      } else {
        warpCtx.drawImage(
          frameCanvas,
          0,
          scanPos,
          frameCanvas.width,
          1,
          0,
          scanPos,
          warpCanvas.width,
          1
        );

        outputCtx.drawImage(
          warpCanvas,
          0,
          0,
          warpCanvas.width,
          scanPos + 1,
          0,
          0,
          outputCanvas.width,
          scanPos + 1
        );
      }

      scanlineCtx.clearRect(0, 0, scanlineCanvas.width, scanlineCanvas.height);
      scanlineCtx.save();
      scanlineCtx.strokeStyle = '#37b7ff';
      scanlineCtx.lineWidth = 2;
      scanlineCtx.beginPath();
      if (direction === 'horizontal') {
        scanlineCtx.moveTo(scanPos + 0.5, 0);
        scanlineCtx.lineTo(scanPos + 0.5, scanlineCanvas.height);
      } else {
        scanlineCtx.moveTo(0, scanPos + 0.5);
        scanlineCtx.lineTo(scanlineCanvas.width, scanPos + 0.5);
      }
      scanlineCtx.stroke();
      scanlineCtx.restore();

      scanPos += 1;
      const maxPos = direction === 'horizontal' ? outputCanvas.width : outputCanvas.height;
      if (scanPos >= maxPos) {
        isScanning = false;
        outputCtx.drawImage(warpCanvas, 0, 0, outputCanvas.width, outputCanvas.height);
        scanlineCtx.clearRect(0, 0, scanlineCanvas.width, scanlineCanvas.height);
        setStatus('Completed one full warp pass.');
        stopLoop();
        return;
      }

      animationId = requestAnimationFrame(draw);
    }

    async function start() {
      if (stream) {
        return;
      }

      startBtn.disabled = true;
      setStatus('Requesting camera permission…');

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'user',
            width: { ideal: 640 },
            height: { ideal: 480 }
          },
          audio: false
        });

        video.srcObject = stream;

        await video.play();
        resetBtn.disabled = false;
        resetOutput();
        setStatus('Camera active. Scanning one full pass…');
      } catch (error) {
        startBtn.disabled = false;
        setStatus('Camera access failed. Please allow permissions and retry.');
        console.error(error);
      }
    }

    startBtn.addEventListener('click', start);
    resetBtn.addEventListener('click', resetOutput);
    directionSelect.addEventListener('change', () => {
      direction = directionSelect.value;
      if (stream) {
        resetOutput();
      }
    });

    window.addEventListener('beforeunload', () => {
      stopLoop();
      if (!stream) {
        return;
      }
      stream.getTracks().forEach((track) => track.stop());
      stream = undefined;
    });

    resetOutput();
  </script>
</body>
</html>
